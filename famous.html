<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Famous Indians</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
            background-size: 400% 400%;
            animation: tricolorWave 10s ease infinite;
            margin: 0;
            padding: 20px;
            color: #222;
        }

        @keyframes tricolorWave {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 30px;
            animation: fadeDown 1.2s ease-out;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-40px) }
            to { opacity: 1; transform: translateY(0) }
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            width: 260px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.4s, box-shadow 0.4s;
            animation: popIn 0.8s ease-out;
            cursor: pointer;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0 }
            to { transform: scale(1); opacity: 1 }
        }

        .card:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <h1>Famous Indians</h1>

    <div class="card-container">

        <a href="gandhi.html" class="card">
            <img src="gandhi.jpg" alt="Subhas Chandra Bose">
            <h2>Subhas Chandra Bose</h2>
            <p>Leader of India's freedom movement.</p>
        </a>

        <a href="apj.html" class="card">
            <img src="apj.jpg" alt="APJ Abdul Kalam">
            <h2>APJ Abdul Kalam</h2>
            <p>Scientist and former President of India.</p>
        </a>

        <a href="lata.html" class="card">
            <img src="lata.jpg" alt="Lata Mangeshkar">
            <h2>Lata Mangeshkar</h2>
            <p>The Nightingale of India.</p>
        </a>

    </div>

</body>
</html>
