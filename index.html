<style>
  /* Existing styles */
  body {
      background-color: #f0f0f0;
      margin: 0;
      font-family: Arial, sans-serif;
  }
  h1 {
      color: #333;
  }

  /* New CSS rules */
  .lightning-trail {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
  }
  .lightning-bolt {
      position: relative;
      display: inline-block;
      background: linear-gradient(to bottom, #ffffff, #f0f0f0);
      animation: flash 1s infinite;
  }
  @keyframes flash {
      0%, 20%, 100% { opacity: 0; }
      40%, 60% { opacity: 1; }
  }
  .shockwave {
      position: absolute;
      border-radius: 50%;
      animation: wave 1s infinite;
  }
  @keyframes wave {
      0% { transform: scale(0); opacity: 1; }
      100% { transform: scale(4); opacity: 0; }
  }
  .screen-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.8);
      opacity: 0;
      animation: flashScreen 1s forwards;
  }
  @keyframes flashScreen {
      0% { opacity: 1; }
      100% { opacity: 0; }
  }
</style>
